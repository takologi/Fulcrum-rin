# Quickstart Configuration File for Fulcrum-RIN (Rincoin)
#
# This is a Rincoin-specific companion to doc/fulcrum-quick-config.conf.
# For a full description of every available option, see
# doc/fulcrum-example-config.conf in the Fulcrum-RIN source tree.
#
# Key differences from a Bitcoin/BCH setup:
#   - rincoind default RPC port is 9556 (mainnet), not 8332
#   - rincoind default P2P port is 9555 (mainnet)
#   - coin = RIN  (enables RinHash proof-of-work verification)
#   - zmqpubhashblock is supported; port 9556 is reserved for RPC,
#     so pick a different port for ZMQ, e.g. 9557
#
# DEFAULTS PHILOSOPHY
#   This template is shipped as "private back-end safe": Electrum ports bind to
#   localhost, peering is OFF, no hostname is announced. Operators running a
#   public, community-serving node should review the sections marked
#   "PUBLIC NODE" below and flip the relevant switches.
#-------------------------------------------------------------------------------

# *REQUIRED* Database directory.
# Rincoin mainnet requires ~2 GB at genesis; plan for growth.
# NOTE: Use native path separators: '/' on Unix, '\' on Windows.
datadir = /var/lib/fulcrum-rin/mainnet

# *REQUIRED* Connect to rincoind's JSON-RPC interface.
# Default rincoind RPC port is 9556 (mainnet).
bitcoind = 127.0.0.1:9556

# *REQUIRED* Authentication to rincoind. Pick ONE of (a) or (b).
#
# (a) RECOMMENDED: cookie-file auth. Rincoin Core writes a fresh secret to
#     .cookie on every restart; nothing sensitive ends up in this config file.
#     Uncomment the line that matches your rincoin datadir:
#rpccookie = /var/lib/rincoin/.rincoin/.cookie
#rpccookie = /home/rincoin/.rincoin/.cookie
#
# (b) Static credentials. Must match rpcuser=/rpcpassword= in rincoin.conf.
#     Use a long, random rpcpassword and chmod 600 this config file.
rpcuser = rinuser
rpcpassword = changeme_use_a_strong_password

# *REQUIRED* Set the coin type to RIN so that Fulcrum uses RinHash
# (BLAKE3 → Argon2d → SHA3-256) when verifying block header proof-of-work.
coin = RIN

# ---------------------------------------------------------------------------
# Listening ports
# ---------------------------------------------------------------------------
#
# SECURITY:
#   The defaults below bind to 127.0.0.1 only. For wallets running on the
#   same host (Electrum-RIN, Komodo Wallet Desktop, BasicSwap-RIN, KDF, etc.)
#   this is sufficient and safe. To expose the server to other machines,
#   change the bind address to 0.0.0.0 (or a specific interface) AND ensure
#   you have a firewall rule in place. Plaintext TCP (50001) should normally
#   stay closed to the internet — encourage clients to use TLS (50002 / 50004).
#

# TCP (unencrypted) — Electrum standard port. Default: turned off, localhost-only template. INSECURE if opened to public networks!
#tcp = 127.0.0.1:50001

# SSL (encrypted) — requires cert= and key= below. Change to 0.0.0.0 to expose to all interfaces (for public nodes only).
ssl = 127.0.0.1:50002

# WebSocket (unencrypted) — leave commented unless a browser client needs it. INSECURE if opened to public networks!
#ws = 127.0.0.1:50003

# WebSocket Secure. Change to 0.0.0.0 to expose to all interfaces (for public nodes only).
wss = 127.0.0.1:50004

# PUBLIC NODE: announce only SSL/WSS to the network. Plaintext is suppressed.
public_tcp_port = 0    #50001 is the default
public_ssl_port = 50002
public_ws_port = 0     #50003 is the default
public_wss_port = 50004


# ---------------------------------------------------------------------------
# TLS / SSL certificates
# Generate a self-signed certificate with:
#   openssl req -newkey rsa:2048 -new -nodes -x509 -days 3650 \
#     -keyout server-key.pem -out server-cert.pem
# Or, for a publicly trusted cert, use Let's Encrypt:
#   certbot certonly --standalone -d your.rincoin.node.example.com
# ---------------------------------------------------------------------------
cert = /etc/fulcrum-rin/server-cert.pem
key  = /etc/fulcrum-rin/server-key.pem

# ---------------------------------------------------------------------------
# ZMQ (optional but strongly recommended for low-latency block notifications)
# In rincoin.conf add:
#   zmqpubhashblock=tcp://127.0.0.1:9557
# ---------------------------------------------------------------------------
#zmqtcpaddr = tcp://127.0.0.1:9557

# ---------------------------------------------------------------------------
# Peering / server identity
# ---------------------------------------------------------------------------
#
# Peer discovery — upstream Fulcrum default is `true`. We ship `false` for
# Fulcrum-RIN because:
#   - the RIN Electrum network is small; the bootstrap seed list IS the
#     network, so transitive crawling adds little,
#   - most Fulcrum-RIN deployments today are private back-ends (wallets,
#     swap engines, indexers) that should not be advertising themselves,
#   - keeping peering off disables an entire RPC surface and the outbound
#     PeerMgr connection subsystem, reducing attack surface.
#
# PUBLIC NODE: set `peering = true`, `announce = true`, set `hostname` to a
# DNS name that resolves to your public IP, and confirm `public_ssl_port`
# is reachable from the internet before flipping the switches.
peering = false
#announce = false   # automatically follows peering=false; shown for clarity

# Public hostname announced in server.peers (leave commented for private node).
#hostname = your.rincoin.node.example.com

# Human-readable description announced to Electrum clients.
banner = Welcome to Fulcrum-RIN — a fast Electrum server for Rincoin (RIN).

# ---------------------------------------------------------------------------
# Admin RPC (optional)
# ---------------------------------------------------------------------------
#
# WARNING: the admin interface has NO AUTHENTICATION. Anyone who can reach
# the bound socket can stop the server, query peer state, and read internal
# stats. Bind ONLY to 127.0.0.1, NEVER to 0.0.0.0 or a public interface.
# Keep firewalled. Use SSH port-forwarding or a UNIX socket reverse-proxy
# if you need remote access.
#admin = 127.0.0.1:8000

# ---------------------------------------------------------------------------
# Performance tuning
# ---------------------------------------------------------------------------

# Number of worker threads (default: number of CPU cores).
#worker_threads = 4

# Maximum number of simultaneous wallet client connections (default: 50000).
# This limit is independent of PeerMgr's outbound peer connection cap
# (~200 active peers, throttled to 10 new/sec by upstream commit acd2685).
# Tune `max_clients` based on RAM and file-descriptor limits, not peering.
#max_clients = 50000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log timestamp format: 'localtime' (default), 'utc', or 'none'.
#ts_format = localtime

# Send logs to syslog (recommended for systemd-managed deployments).
# When false, Fulcrum logs to stdout/stderr — pair with a logrotate(8)
# config if you redirect those to a file.
#syslog = false

# Verbose / debug output (very chatty — only enable for troubleshooting).
#debug = false
